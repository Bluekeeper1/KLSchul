<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Live Counter</title>
</head>

<body>
  <h1 id="count">0</h1>

  <button id="plus">+</button>
  <button id="minus">-</button>

  <audio id="sound" src="click.mp3"></audio>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    // 🔑 DEINE SUPABASE DATEN EINTRAGEN
    const supabaseUrl = "https://ollmmbnptcpktgtltzzz.supabase.co";
    const supabaseKey = "sb_publishable_7E3Ai7_08sGkXhwhm85USw_Ikf5taX1";

    const supabase = createClient(supabaseUrl, supabaseKey);

    let count = 0;

    const countEl = document.getElementById("count");
    const sound = document.getElementById("sound");

    // -------------------------
    // 1. INIT LOAD
    // -------------------------
    async function load() {
      const { data, error } = await supabase
        .from("counter")
        .select("*")
        .eq("id", 1)
        .single();

      if (!error) {
        count = data.value;
        countEl.innerText = count;
      }
    }

    // -------------------------
    // 2. UPDATE DB
    // -------------------------
    async function updateValue(newValue) {
      const { error } = await supabase
        .from("counter")
        .update({ value: newValue })
        .eq("id", 1);

      if (error) console.error(error);
    }

    // -------------------------
    // 3. BUTTONS
    // -------------------------
    document.getElementById("plus").addEventListener("click", async () => {
      count++;
      await updateValue(count);
    });

    document.getElementById("minus").addEventListener("click", async () => {
      count--;
      await updateValue(count);
    });

    // -------------------------
    // 4. REALTIME LISTENER
    // -------------------------
    supabase
      .channel("counter-channel")
      .on(
        "postgres_changes",
        {
          event: "UPDATE",
          schema: "public",
          table: "counter",
        },
        (payload) => {
          count = payload.new.value;
          countEl.innerText = count;
          sound.play().catch(() => {});
        }
      )
      .subscribe();

    // Start
    load();
  </script>
</body>
</html>
