<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supabase Live Counter</title>

    <style>
      body {
        margin: 0;
        height: 20vh;
        width: 100vw;
        font-family: sans-serif;

        display: grid;
        grid-template-rows: auto  1fr auto;

        overflow: hidden;
      }

      /* SYNC STATUS */
      #syncStatus {
        position: absolute;
        top: 2vh;
        left: 2vw;
        font-size: clamp(14px, 2vw, 24px);
        display: flex;
        align-items: center;
        gap: 1vw;
      }

      #dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: gray;
      }

      /* COUNTER MITTE */
      #count {
        display: flex;
        align-items: center;
        justify-content: center;

        font-size: clamp(150px, 10vmin, 220px);
      }

      /* BUTTONS UNTEN */
      #buttons {
        display: flex;
        justify-content: center;
        gap: 0vw;
        padding-bottom: 80vh;
      }

      button {
        font-size: clamp(100px, 1vmin, 400px);
        padding: 1vh 10vw;
        color: white;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        max-width: 50vw;
      }

      #plus { background: #4CAF50; }
      #minus { background: #f44336; }
    </style>
  </head>

  <body>
    <!-- SYNC STATUS -->
    <div id="syncStatus">
      <div id="dot"></div>
      <span id="syncText">connecting...</span>
    </div>

    <!-- COUNTER -->
    <h1 id="count">0</h1>

    <!-- BUTTONS -->
    <div id="buttons">
      <button id="plus">+</button>
      <button id="minus">-</button>
    </div>

    <audio id="sound" src="click.mp3"></audio>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      const supabaseUrl = "https://ollmmbnptcpktgtltzzz.supabase.co";
      const supabaseKey = "sb_publishable_7E3Ai7_08sGkXhwhm85USw_Ikf5taX1";

      const supabase = createClient(supabaseUrl, supabaseKey);

      let count = 0;
      let audioUnlocked = false;
      let soundTimer = null;
      let lastValue = null;

      const countEl = document.getElementById("count");
      const sound = document.getElementById("sound");

      const dot = document.getElementById("dot");
      const syncText = document.getElementById("syncText");

      function setSync(status) {
        if (status === "online") {
          dot.style.background = "#4CAF50";
          syncText.innerText = "verbunden";
        } else if (status === "offline") {
          dot.style.background = "#f44336";
          syncText.innerText = "offline";
        } else {
          dot.style.background = "gray";
          syncText.innerText = "Verbindung wird hergestellt...";
        }
      }

      function unlockAudio() {
        if (audioUnlocked) return;

        sound.play()
          .then(() => {
            sound.pause();
            sound.currentTime = 0;
            audioUnlocked = true;
          })
          .catch(() => {});
      }

      async function load() {
        const { data, error } = await supabase
          .from("counter")
          .select("value")
          .eq("id", 1)
          .single();

        if (error) return console.error(error);

        count = data.value;
        countEl.innerText = count;
      }

      async function updateCounter(delta) {
        const { data, error } = await supabase
          .from("counter")
          .select("value")
          .eq("id", 1)
          .single();

        if (error) return console.error(error);

        const newValue = data.value + delta;

        await supabase
          .from("counter")
          .update({ value: newValue })
          .eq("id", 1);
      }

      document.getElementById("plus").addEventListener("click", () => {
        unlockAudio();
        updateCounter(1);
      });

      document.getElementById("minus").addEventListener("click", () => {
        unlockAudio();
        updateCounter(-1);
      });

      supabase
        .channel("counter-live")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "counter" },
          async () => {
            const { data } = await supabase
              .from("counter")
              .select("value")
              .eq("id", 1)
              .single();

            const newValue = data.value;

            count = newValue;
            countEl.innerText = count;

            setSync("online");

            if (newValue === lastValue) return;
            lastValue = newValue;

            clearTimeout(soundTimer);

            soundTimer = setTimeout(() => {
              if (audioUnlocked) {
                sound.currentTime = 0;
                sound.play().catch(() => {});
              }
            }, 5000);
          }
        )
        .subscribe((status) => {
          if (status === "SUBSCRIBED") setSync("online");
          else if (status === "CLOSED") setSync("offline");
          else setSync("connecting");
        });

      load();
    </script>
  </body>
</html>
