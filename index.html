<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Supabase Live Counter</title>
</head>

<body>
  <h1 id="count">0</h1>

  <button id="plus">+</button>
  <button id="minus">-</button>

  <audio id="sound" src="click.mp3"></audio>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    // 🔑 Supabase Daten
    const supabaseUrl = "https://ollmmbnptcpktgtltzzz.supabase.co";
    const supabaseKey = "sb_publishable_7E3Ai7_08sGkXhwhm85USw_Ikf5taX1";

    const supabase = createClient(supabaseUrl, supabaseKey);

    const countEl = document.getElementById("count");
    const sound = document.getElementById("sound");

    let count = 0;

    // -------------------------
    // INIT LOAD
    // -------------------------
    async function load() {
      const { data, error } = await supabase
        .from("counter")
        .select("value")
        .eq("id", 1)
        .single();

      if (error) {
        console.error(error);
        return;
      }

      count = data.value;
      countEl.innerText = count;
    }

    // -------------------------
    // UPDATE (DB ist Master)
    // -------------------------
    async function updateCounter(delta) {
      const { data, error } = await supabase
        .from("counter")
        .select("value")
        .eq("id", 1)
        .single();

      if (error) {
        console.error(error);
        return;
      }

      const newValue = data.value + delta;

      const { error: updateError } = await supabase
        .from("counter")
        .update({ value: newValue })
        .eq("id", 1);

      if (updateError) {
        console.error(updateError);
      }
    }

    // -------------------------
    // BUTTONS
    // -------------------------
    document.getElementById("plus").addEventListener("click", () => {
      updateCounter(1);
    });

    document.getElementById("minus").addEventListener("click", () => {
      updateCounter(-1);
    });

    // -------------------------
    // REALTIME (ROBUST)
    // -------------------------
    supabase
      .channel("counter-live")
      .on(
        "postgres_changes",
        {
          event: "*",
          schema: "public",
          table: "counter",
        },
        async () => {
          const { data, error } = await supabase
            .from("counter")
            .select("value")
            .eq("id", 1)
            .single();

          if (error) {
            console.error(error);
            return;
          }

          count = data.value;
          countEl.innerText = count;

          sound.play().catch(() => {});
        }
      )
      .subscribe();

    // Start
    load();
  </script>
</body>
</html>
</html>
