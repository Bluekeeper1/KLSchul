<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Supabase Live Counter</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: white;
  overflow: hidden;
}

/* COUNTER */
#count {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 60vh;
  font-size: clamp(150px, 100vmin, 200px);
}

/* INFO TEXT */
#info {
  text-align: center;
  font-size: 20px;
  margin-top: -40px;
  opacity: 0.8;
}

/* BUTTONS */
#buttons {
  display: flex;
  justify-content: center;
  gap: 20px;
}

button.main {
  font-size: 40px;
  padding: 10px 60px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  color: white;
}

#plus { background: #4caf50; }
#minus { background: #f44336; }

/* COLOR PICKER */
#colorPicker {
  position: absolute;
  bottom: 2vh;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 15px;
}

.colorBtn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
}

.colorBtn.active {
  border: 3px solid white;
  transform: scale(1.2);
}

/* COLORS */
.c1 { background: #2196f3; }
.c2 { background: #4caf50; }
.c3 { background: #f44336; }
.c4 { background: #ff9800; }
.c5 { background: #9c27b0; }
.c6 { background: #00bcd4; }

</style>
</head>

<body>

<div id="count">0</div>
<div id="info">keine Änderung</div>

<div id="buttons">
  <button id="plus" class="main">+</button>
  <button id="minus" class="main">-</button>
</div>

<div id="colorPicker">
  <div class="colorBtn c1" data-color="Blau"></div>
  <div class="colorBtn c2" data-color="Grün"></div>
  <div class="colorBtn c3" data-color="Rot"></div>
  <div class="colorBtn c4" data-color="Orange"></div>
  <div class="colorBtn c5" data-color="Lila"></div>
  <div class="colorBtn c6" data-color="Türkis"></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://ollmmbnptcpktgtltzzz.supabase.co",
  "sb_publishable_7E3Ai7_08sGkXhwhm85USw_Ikf5taX1"
);

let count = 0;
let selectedColor = localStorage.getItem("color") || "Blau";

const countEl = document.getElementById("count");
const infoEl = document.getElementById("info");

/* COLOR PICKER */
const buttons = document.querySelectorAll(".colorBtn");

buttons.forEach(btn => {
  if (btn.dataset.color === selectedColor) {
    btn.classList.add("active");
  }

  btn.onclick = () => {
    selectedColor = btn.dataset.color;
    localStorage.setItem("color", selectedColor);

    buttons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  };
});

/* LOAD */
async function load() {
  const { data } = await supabase
    .from("counter")
    .select("value, last_color")
    .eq("id", 1)
    .single();

  count = data.value;
  countEl.innerText = count;

  if (data.last_color) {
    infoEl.innerText = data.last_color;
  }
}

/* UPDATE */
async function updateCounter(delta) {
  const { data } = await supabase
    .from("counter")
    .select("value")
    .eq("id", 1)
    .single();

  const newValue = data.value + delta;

  const text = `${delta > 0 ? "+" : ""}${delta} von ${selectedColor}`;

  await supabase
    .from("counter")
    .update({
      value: newValue,
      last_color: text
    })
    .eq("id", 1);
}

/* BUTTONS */
document.getElementById("plus").onclick = () => updateCounter(1);
document.getElementById("minus").onclick = () => updateCounter(-1);

/* REALTIME */
supabase
  .channel("live")
  .on("postgres_changes",
    { event: "*", schema: "public", table: "counter" },
    (payload) => {
      const data = payload.new;

      count = data.value;
      countEl.innerText = count;

      if (data.last_color) {
        infoEl.innerText = data.last_color;
      }
    }
  )
  .subscribe();

load();
</script>

</body>
</html>
