<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Color Slots</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* COLOR SELECT */
#colors {
  display: flex;
  gap: 12px;
  margin-bottom: 25px;
}

.colorBtn {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid transparent;
}

.colorBtn.active {
  border: 3px solid black;
  transform: scale(1.1);
}

/* SLOTS */
#slots {
  display: grid;
  grid-template-columns: repeat(2, 120px);
  gap: 20px;
}

.slot {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: #ddd;
  cursor: pointer;
  transition: 0.2s;
}

.slot:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<h3>Farbe wählen</h3>
<div id="colors"></div>

<div id="slots"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://ollmmbnptcpktgtltzzz.supabase.co",
  "sb_publishable_7E3Ai7_08sGkXhwhm85USw_Ikf5taX1"
);

/* FESTE FARBEN */
const COLORS = ["blue", "red", "green", "yellow", "purple"];

let myColor = localStorage.getItem("color") || null;

const colorsEl = document.getElementById("colors");
const slotsEl = document.getElementById("slots");

/* =========================
   COLOR UI
========================= */
function renderColors(used) {
  colorsEl.innerHTML = "";

  COLORS.forEach(color => {
    const div = document.createElement("div");
    div.className = "colorBtn";
    div.style.background = color;

    if (color === myColor) div.classList.add("active");

    // block wenn benutzt von jemand anderem
    if (used.includes(color) && color !== myColor) {
      div.style.opacity = "0.3";
      div.style.pointerEvents = "none";
    }

    div.onclick = () => {
      myColor = color;
      localStorage.setItem("color", color);
      load();
    };

    colorsEl.appendChild(div);
  });
}

/* =========================
   LOAD SLOTS
========================= */
async function load() {
  const { data, error } = await supabase.from("slots").select("*");

  if (error) {
    console.error("LOAD ERROR:", error);
    return;
  }

  if (!data) return;

  const usedColors = data.map(s => s.color).filter(Boolean);

  renderColors(usedColors);

  slotsEl.innerHTML = "";

  data.forEach(slot => {
    const div = document.createElement("div");
    div.className = "slot";
    div.style.background = slot.color || "#ddd";

    div.onclick = () => clickSlot(slot);

    slotsEl.appendChild(div);
  });
}

/* =========================
   CLICK LOGIC (FIXED)
========================= */
async function clickSlot(slot) {
  if (!myColor) {
    alert("Bitte zuerst Farbe wählen!");
    return;
  }

  // aktuelle DB holen (wichtig gegen Konflikte)
  const { data: latest } = await supabase.from("slots").select("*");

  const mySlot = latest.find(s => s.color === myColor);

  // wenn Farbe schon woanders benutzt → block
  if (mySlot && mySlot.id !== slot.id) {
    alert("Diese Farbe ist bereits belegt!");
    return;
  }

  // TOGGLE
  const newColor = slot.color ? null : myColor;

  const { error } = await supabase
    .from("slots")
    .update({ color: newColor })
    .eq("id", slot.id);

  if (error) {
    console.error("UPDATE ERROR:", error);
    alert(error.message);
  }
}

/* =========================
   REALTIME
========================= */
supabase.channel("slots-live")
  .on(
    "postgres_changes",
    { event: "*", schema: "public", table: "slots" },
    () => load()
  )
  .subscribe();

/* START */
load();
</script>

</body>
</html>
