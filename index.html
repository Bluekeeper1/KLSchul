<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supabase Live Counter</title>

    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        background: #111;
        color: white;
        overflow: hidden;
        transition: background 0.3s;
      }

      body.limitReached {
        background: #b71c1c;
      }

      /* SYNC */
      #syncStatus {
        position: absolute;
        top: 2vh;
        left: 2vw;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: clamp(14px, 2vw, 24px);
      }

      #dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: gray;
      }

      /* LAST UPDATE */
      #lastUpdate {
        position: absolute;
        top: 6vh;
        left: 2vw;
        font-size: clamp(12px, 1.5vw, 18px);
        opacity: 0.7;
      }

      /* REFRESH */
      #refreshBtn {
        position: absolute;
        top: 10vh;
        left: 2vw;
        padding: 0.5vh 1vw;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #2196f3;
        color: white;
      }

      #refreshBtn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* TOP RIGHT PANEL */
      #maxContainer {
        position: absolute;
        top: 2vh;
        right: 2vw;
        background: rgb(0, 153, 255);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 12px;
        padding: 1vh 1vw;
        text-align: center;
        backdrop-filter: blur(6px);
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      }

      #maxValue {
        font-size: 24px;
        margin: 5px 0;
      }

      #maxButtons button {
        margin: 2px;
        border: none;
        padding: 4px 10px;
        cursor: pointer;
        color: white;
        border-radius: 6px;
      }

      #maxPlus { background: #4caf50; }
      #maxMinus { background: #f44336; }

      /* COUNTER */
      #count {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 70vh;
        font-size: clamp(150px, 100vmin, 200px);
      }

      /* BUTTONS */
      #buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
      }

      button {
        font-size: 40px;
        padding: 10px 60px;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        color: white;
      }

      #plus { background: #4caf50; }
      #minus { background: #f44336; }
    </style>
  </head>

  <body>

    <!-- SYNC -->
    <div id="syncStatus">
      <div id="dot"></div>
      <span id="syncText">connecting...</span>
    </div>

    <!-- LAST UPDATE -->
    <div id="lastUpdate">letztes update: nie</div>

    <!-- REFRESH -->
    <button id="refreshBtn">↻ aktualisieren</button>

    <!-- MAX -->
    <div id="maxContainer">
      <div>Maximal</div>
      <div id="maxValue">10</div>
      <div id="maxButtons">
        <button id="maxPlus">+</button>
        <button id="maxMinus">-</button>
      </div>
    </div>

    <!-- COUNTER -->
    <div id="count">0</div>

    <!-- BUTTONS -->
    <div id="buttons">
      <button id="plus">+</button>
      <button id="minus">-</button>
    </div>

    <audio id="sound" src="click.mp3"></audio>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      const supabase = createClient(
        "https://ollmmbnptcpktgtltzzz.supabase.co",
        "sb_publishable_7E3Ai7_08sGkXhwhm85USw_Ikf5taX1"
      );

      let count = 0;
      let maxValue = 10;

      let lastValue = null;
      let lastUpdateTime = null;
      let soundTimer = null;
      let audioUnlocked = false;

      const countEl = document.getElementById("count");
      const maxEl = document.getElementById("maxValue");
      const dot = document.getElementById("dot");
      const syncText = document.getElementById("syncText");
      const lastUpdateEl = document.getElementById("lastUpdate");
      const sound = document.getElementById("sound");

      /* SYNC */
      function setSync(status) {
        if (status === "online") {
          dot.style.background = "#4CAF50";
          syncText.innerText = "verbunden";
        } else if (status === "offline") {
          dot.style.background = "#f44336";
          syncText.innerText = "offline";
        } else {
          dot.style.background = "gray";
          syncText.innerText = "connecting...";
        }
      }

      /* LAST UPDATE */
      function updateLastUpdate() {
        if (!lastUpdateTime) {
          lastUpdateEl.innerText = "letztes update: nie";
          return;
        }

        const diff = Math.floor((Date.now() - lastUpdateTime) / 1000);

        if (diff < 5) {
          lastUpdateEl.innerText = "letztes update: gerade eben";
        } else if (diff < 60) {
          lastUpdateEl.innerText = `letztes update: vor ${diff}s`;
        } else {
          lastUpdateEl.innerText =
            "letztes update: " +
            new Date(lastUpdateTime).toLocaleTimeString("de-DE");
        }
      }

      function checkLimit() {
        document.body.classList.toggle("limitReached", count >= maxValue);
      }

      /* LOAD */
      async function load() {
        const { data } = await supabase
          .from("counter")
          .select("value, max_value")
          .eq("id", 1)
          .single();

        count = data.value;
        maxValue = data.max_value ?? 10;

        countEl.innerText = count;
        maxEl.innerText = maxValue;

        lastValue = count;
        lastUpdateTime = Date.now();

        checkLimit();
        updateLastUpdate();
      }

      /* REFRESH (FIXED) */
      async function refresh() {
        const { data } = await supabase
          .from("counter")
          .select("value, max_value")
          .eq("id", 1)
          .single();

        count = data.value;
        maxValue = data.max_value ?? 10;

        countEl.innerText = count;
        maxEl.innerText = maxValue;

        lastUpdateTime = Date.now();

        checkLimit();
        updateLastUpdate();
      }

      /* COUNTER UPDATE */
      async function updateCounter(delta) {
        audioUnlocked = true;

        const { data } = await supabase
          .from("counter")
          .select("value")
          .eq("id", 1)
          .single();

        await supabase
          .from("counter")
          .update({ value: data.value + delta })
          .eq("id", 1);
      }

      /* MAX UPDATE */
      async function updateMax(delta) {
        const { data } = await supabase
          .from("counter")
          .select("max_value")
          .eq("id", 1)
          .single();

        let newMax = (data.max_value ?? 10) + delta;
        if (newMax < 0) newMax = 0;

        await supabase
          .from("counter")
          .update({ max_value: newMax })
          .eq("id", 1);
      }

      /* BUTTONS */
      document.getElementById("plus").onclick = () => updateCounter(1);
      document.getElementById("minus").onclick = () => updateCounter(-1);
      document.getElementById("maxPlus").onclick = () => updateMax(1);
      document.getElementById("maxMinus").onclick = () => updateMax(-1);

      document.getElementById("refreshBtn").onclick = async (e) => {
        const btn = e.target;
        btn.disabled = true;

        await refresh();

        setTimeout(() => {
          btn.disabled = false;
        }, 5000);
      };

      /* REALTIME */
      supabase
        .channel("counter-live")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "counter" },
          (payload) => {
            const data = payload.new;

            count = data.value;
            maxValue = data.max_value ?? 10;

            countEl.innerText = count;
            maxEl.innerText = maxValue;

            lastUpdateTime = Date.now();

            checkLimit();
            updateLastUpdate();

            /* SOUND */
            if (count === lastValue) return;
            lastValue = count;

            clearTimeout(soundTimer);

            soundTimer = setTimeout(() => {
              if (audioUnlocked) {
                sound.currentTime = 0;
                sound.play().catch(() => {});
              }
            }, 2000);
          }
        )
        .subscribe((status) => {
          if (status === "SUBSCRIBED") setSync("online");
          else if (status === "CLOSED") setSync("offline");
          else setSync("connecting");
        });

      setInterval(updateLastUpdate, 1000);

      load();
    </script>
  </body>
</html>
