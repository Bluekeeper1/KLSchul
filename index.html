<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supabase Live Counter</title>

    <style>
      body {
        margin: 0;
        height: 20vh;
        width: 100vw;
        font-family: sans-serif;
        display: grid;
        grid-template-rows: auto 1fr auto;
        overflow: hidden;
        background: #111;
        color: white;
        transition: background 0.3s;
      }

      body.limitReached {
        background: #b71c1c;
      }

      #syncStatus {
        position: absolute;
        top: 2vh;
        left: 2vw;
        font-size: clamp(14px, 2vw, 24px);
        display: flex;
        align-items: center;
        gap: 1vw;
      }

      #dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: gray;
      }

      #lastUpdate {
        position: absolute;
        top: 6vh;
        left: 2vw;
        font-size: clamp(12px, 1.5vw, 18px);
        opacity: 0.7;
      }

      #refreshBtn {
        position: absolute;
        top: 10vh;
        left: 2vw;
        font-size: clamp(30px, 20vw, 30px);
        padding: 0.5vh 1vw;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #2196f3;
        color: white;
      }

      #refreshBtn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      #maxContainer {
        position: absolute;
        top: 2vh;
        right: 2vw;
        text-align: center;
      }

      #maxLabel {
        font-size: clamp(12px, 1.5vw, 18px);
        opacity: 0.8;
      }

      #maxValue {
        font-size: clamp(20px, 3vw, 30px);
        margin: 0.5vh 0;
      }

      #maxButtons button {
        font-size: 14px;
        padding: 0.3vh 0.8vw;
        margin: 0 2px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        color: white;
      }

      #maxPlus {
        background: #4caf50;
      }

      #maxMinus {
        background: #f44336;
      }

      #count {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: clamp(150px, 100vmin, 200px);
      }

      #buttons {
        display: flex;
        justify-content: center;
        padding-bottom: 80vh;
      }

      button {
        font-size: clamp(100px, 1vmin, 4px);
        padding: 1vh 10vw;
        color: white;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        max-width: 50vw;
      }

      #plus {
        background: #4caf50;
      }

      #minus {
        background: #f44336;
      }
    </style>
  </head>

  <body>
    <!-- SYNC -->
    <div id="syncStatus">
      <div id="dot"></div>
      <span id="syncText">Verbindung wird hergestellt...</span>
    </div>

    <div id="lastUpdate">letztes update: nie</div>
    <button id="refreshBtn">↻ aktualisieren</button>

    <!-- MAX -->
    <div id="maxContainer">
      <div id="maxLabel">Maximal</div>
      <div id="maxValue">10</div>
      <div id="maxButtons">
        <button id="maxPlus">+</button>
        <button id="maxMinus">-</button>
      </div>
    </div>

    <h1 id="count">0</h1>

    <div id="buttons">
      <button id="plus">+</button>
      <button id="minus">-</button>
    </div>

    <audio id="sound" src="click.mp3"></audio>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      const supabase = createClient(
        "https://ollmmbnptcpktgtltzzz.supabase.co",
        "sb_publishable_7E3Ai7_08sGkXhwhm85USw_Ikf5taX1"
      );

      let count = 0;
      let maxValue = 10;

      let lastValue = null;
      let soundTimer = null;
      let audioUnlocked = false;

      const countEl = document.getElementById("count");
      const maxEl = document.getElementById("maxValue");
      const sound = document.getElementById("sound");
      const dot = document.getElementById("dot");
      const syncText = document.getElementById("syncText");

      function setSync(status) {
        if (status === "online") {
          dot.style.background = "#4CAF50";
          syncText.innerText = "verbunden";
        } else if (status === "offline") {
          dot.style.background = "#f44336";
          syncText.innerText = "offline";
        } else {
          dot.style.background = "gray";
          syncText.innerText = "Verbindung wird hergestellt...";
        }
      }

      function checkLimit() {
        document.body.classList.toggle("limitReached", count >= maxValue);
      }

      async function load() {
        const { data } = await supabase
          .from("counter")
          .select("value, max_value")
          .eq("id", 1)
          .single();

        count = data.value;
        maxValue = data.max_value ?? 10;

        countEl.innerText = count;
        maxEl.innerText = maxValue;

        lastValue = count;

        checkLimit();
      }

      async function updateCounter(delta) {
        audioUnlocked = true;

        const { data } = await supabase
          .from("counter")
          .select("value")
          .eq("id", 1)
          .single();

        await supabase
          .from("counter")
          .update({ value: data.value + delta })
          .eq("id", 1);
      }

      async function updateMax(delta) {
        const { data } = await supabase
          .from("counter")
          .select("max_value")
          .eq("id", 1)
          .single();

        let newMax = (data.max_value ?? 10) + delta;
        if (newMax < 0) newMax = 0;

        await supabase
          .from("counter")
          .update({ max_value: newMax })
          .eq("id", 1);
      }

      document.getElementById("plus").onclick = () => updateCounter(1);
      document.getElementById("minus").onclick = () => updateCounter(-1);
      document.getElementById("maxPlus").onclick = () => updateMax(1);
      document.getElementById("maxMinus").onclick = () => updateMax(-1);

      /* 🔄 REALTIME + SOUND */
      supabase
        .channel("counter-live")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "counter" },
          (payload) => {
            const data = payload.new;

            const newValue = data.value;

            count = newValue;
            maxValue = data.max_value ?? 10;

            countEl.innerText = count;
            maxEl.innerText = maxValue;

            checkLimit();

            /* 🔊 SOUND LOGIC */
            if (newValue === lastValue) return;
            lastValue = newValue;

            clearTimeout(soundTimer);

            soundTimer = setTimeout(() => {
              if (audioUnlocked) {
                sound.currentTime = 0;
                sound.play().catch(() => {});
              }
            }, 2000);
          }
        )
        .subscribe((status) => {
          if (status === "SUBSCRIBED") setSync("online");
          else if (status === "CLOSED") setSync("offline");
          else setSync("connecting");
        });

      load();
    </script>
  </body>
</html>
