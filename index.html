<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Supabase Live Counter</title>
</head>

<body style="margin:0; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">

  <div style="text-align:center;">

    <!-- COUNTER -->
    <h1 id="count" style="font-size:12vw; margin:0;">0</h1>

    <!-- BUTTONS -->
    <div style="margin-top:3vh; display:flex; gap:2vw; justify-content:center;">

      <button id="plus" style="
        font-size:6vw;
        padding:1vh 3vw;
        background:#4CAF50;
        color:white;
        border:none;
        border-radius:12px;
        cursor:pointer;
        min-width:20vw;
      ">+</button>

      <button id="minus" style="
        font-size:6vw;
        padding:1vh 3vw;
        background:#f44336;
        color:white;
        border:none;
        border-radius:12px;
        cursor:pointer;
        min-width:20vw;
      ">-</button>

    </div>

    <audio id="sound" src="click.mp3"></audio>
  </div>

  <!-- SUPABASE SCRIPT -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    // 🔑 DEINE SUPABASE DATEN
    const supabaseUrl = "https://ollmmbnptcpktgtltzzz.supabase.co";
    const supabaseKey = "sb_publishable_7E3Ai7_08sGkXhwhm85USw_Ikf5taX1";

    const supabase = createClient(supabaseUrl, supabaseKey);

    let count = 0;

    const countEl = document.getElementById("count");
    const sound = document.getElementById("sound");

    // -------------------------
    // INIT LOAD
    // -------------------------
    async function load() {
      const { data, error } = await supabase
        .from("counter")
        .select("value")
        .eq("id", 1)
        .single();

      if (error) {
        console.error(error);
        return;
      }

      count = data.value;
      countEl.innerText = count;
    }

    // -------------------------
    // UPDATE COUNTER (DB MASTER)
    // -------------------------
    async function updateCounter(delta) {
      const { data, error } = await supabase
        .from("counter")
        .select("value")
        .eq("id", 1)
        .single();

      if (error) {
        console.error(error);
        return;
      }

      const newValue = data.value + delta;

      const { error: updateError } = await supabase
        .from("counter")
        .update({ value: newValue })
        .eq("id", 1);

      if (updateError) {
        console.error(updateError);
      }
    }

    // -------------------------
    // BUTTONS
    // -------------------------
    document.getElementById("plus").addEventListener("click", () => {
      updateCounter(1);
    });

    document.getElementById("minus").addEventListener("click", () => {
      updateCounter(-1);
    });

    // -------------------------
    // REALTIME SYNC
    // -------------------------
    supabase
      .channel("counter-live")
      .on(
        "postgres_changes",
        {
          event: "*",
          schema: "public",
          table: "counter",
        },
        async () => {
          const { data, error } = await supabase
            .from("counter")
            .select("value")
            .eq("id", 1)
            .single();

          if (error) {
            console.error(error);
            return;
          }

          count = data.value;
          countEl.innerText = count;

          sound.play().catch(() => {});
        }
      )
      .subscribe();

    // START
    load();
  </script>
</body>
</html>
