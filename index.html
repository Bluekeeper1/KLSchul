<<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supabase Live Counter</title>

    <style>
      body {
        margin: 0;
        height: 20vh;
        width: 100vw;
        font-family: sans-serif;

        display: grid;
        grid-template-rows: auto 1fr auto;
        overflow: hidden;
      }

      /* SYNC STATUS */
      #syncStatus {
        position: absolute;
        top: 2vh;
        left: 2vw;
        font-size: clamp(14px, 2vw, 24px);
        display: flex;
        align-items: center;
        gap: 1vw;
      }

      #dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: gray;
      }

      /* LAST UPDATE */
      #lastUpdate {
        position: absolute;
        top: 6vh;
        left: 2vw;
        font-size: clamp(12px, 1.5vw, 18px);
        opacity: 0.7;
      }

      /* REFRESH BUTTON */
      #refreshBtn {
        position: absolute;
        top: 10vh;
        left: 2vw;

        font-size: clamp(12px, 1.5vw, 18px);
        padding: 0.5vh 1vw;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #2196f3;
        color: white;
      }

      /* COUNTER */
      #count {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: clamp(150px, 10vmin, 220px);
      }

      /* BUTTONS */
      #buttons {
        display: flex;
        justify-content: center;
        gap: 0vw;
        padding-bottom: 80vh;
      }

      button {
        font-size: clamp(100px, 1vmin, 400px);
        padding: 1vh 10vw;
        color: white;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        max-width: 50vw;
      }

      #plus { background: #4CAF50; }
      #minus { background: #f44336; }
    </style>
  </head>

  <body>
    <!-- SYNC STATUS -->
    <div id="syncStatus">
      <div id="dot"></div>
      <span id="syncText">connecting...</span>
    </div>

    <!-- LAST UPDATE -->
    <div id="lastUpdate">letztes update: nie</div>

    <!-- REFRESH BUTTON -->
    <button id="refreshBtn">↻ aktualisieren</button>

    <!-- COUNTER -->
    <h1 id="count">0</h1>

    <!-- BUTTONS -->
    <div id="buttons">
      <button id="plus">+</button>
      <button id="minus">-</button>
    </div>

    <audio id="sound" src="click.mp3"></audio>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      const supabaseUrl = "https://ollmmbnptcpktgtltzzz.supabase.co";
      const supabaseKey = "sb_publishable_7E3Ai7_08sGkXhwhm85USw_Ikf5taX1";

      const supabase = createClient(supabaseUrl, supabaseKey);

      let count = 0;
      let audioUnlocked = false;
      let soundTimer = null;
      let lastValue = null;
      let lastUpdateTime = null;

      const countEl = document.getElementById("count");
      const sound = document.getElementById("sound");
      const dot = document.getElementById("dot");
      const syncText = document.getElementById("syncText");
      const lastUpdateEl = document.getElementById("lastUpdate");

      function setSync(status) {
        if (status === "online") {
          dot.style.background = "#4CAF50";
          syncText.innerText = "verbunden";
        } else if (status === "offline") {
          dot.style.background = "#f44336";
          syncText.innerText = "offline";
        } else {
          dot.style.background = "gray";
          syncText.innerText = "Verbindung wird hergestellt...";
        }
      }

      function updateLastUpdateDisplay() {
        if (!lastUpdateTime) {
          lastUpdateEl.innerText = "letztes update: nie";
          return;
        }

        const now = Date.now();
        const diff = Math.floor((now - lastUpdateTime) / 1000);

        if (diff < 5) {
          lastUpdateEl.innerText = "letztes update: gerade eben";
        } else if (diff < 60) {
          lastUpdateEl.innerText = `letztes update: vor ${diff}s`;
        } else {
          const date = new Date(lastUpdateTime);
          lastUpdateEl.innerText =
            "letztes update: " +
            date.toLocaleTimeString("de-DE", {
              hour: "2-digit",
              minute: "2-digit",
              second: "2-digit",
            });
        }
      }

      async function load() {
        const { data, error } = await supabase
          .from("counter")
          .select("value")
          .eq("id", 1)
          .single();

        if (error) return console.error(error);

        count = data.value;
        countEl.innerText = count;

        lastUpdateTime = Date.now();
        updateLastUpdateDisplay();
      }

      async function updateCounter(delta) {
        const { data, error } = await supabase
          .from("counter")
          .select("value")
          .eq("id", 1)
          .single();

        if (error) return console.error(error);

        const newValue = data.value + delta;

        await supabase
          .from("counter")
          .update({ value: newValue })
          .eq("id", 1);
      }

      // REFRESH FUNCTION
      async function refresh() {
        const { data, error } = await supabase
          .from("counter")
          .select("value")
          .eq("id", 1)
          .single();

        if (error) return console.error(error);

        count = data.value;
        countEl.innerText = count;

        lastUpdateTime = Date.now();
        updateLastUpdateDisplay();
      }

      document.getElementById("plus").addEventListener("click", () => {
        audioUnlocked = true;
        updateCounter(1);
      });

      document.getElementById("minus").addEventListener("click", () => {
        audioUnlocked = true;
        updateCounter(-1);
      });

      document.getElementById("refreshBtn").addEventListener("click", () => {
        refresh();
      });

      supabase
        .channel("counter-live")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "counter" },
          async () => {
            const { data } = await supabase
              .from("counter")
              .select("value")
              .eq("id", 1)
              .single();

            const newValue = data.value;

            count = newValue;
            countEl.innerText = count;

            lastUpdateTime = Date.now();
            updateLastUpdateDisplay();

            if (newValue === lastValue) return;
            lastValue = newValue;

            clearTimeout(soundTimer);

            soundTimer = setTimeout(() => {
              if (audioUnlocked) {
                sound.play().catch(() => {});
              }
            }, 2000);
          }
        )
        .subscribe((status) => {
          if (status === "SUBSCRIBED") setSync("online");
          else if (status === "CLOSED") setSync("offline");
          else setSync("connecting");
        });

      setInterval(updateLastUpdateDisplay, 1000);

      load();
    </script>
  </body>
</html>
