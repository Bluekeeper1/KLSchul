<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Farb Slots</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* FARBEN */
#colors {
  display:flex;
  gap:15px;
  margin-bottom:30px;
}

.colorBtn {
  width:50px;
  height:50px;
  border-radius:50%;
  cursor:pointer;
  border:4px solid transparent;
}

.colorBtn.active {
  border:4px solid black;
}

/* SLOTS */
#slots {
  display:grid;
  grid-template-columns:repeat(2, 120px);
  gap:25px;
}

.slot {
  width:120px;
  height:120px;
  border-radius:50%;
  background:#ddd;
  cursor:pointer;
  transition:0.2s;
}

.slot:hover {
  transform:scale(1.05);
}
</style>
</head>

<body>

<h2>Farbe wählen</h2>

<div id="colors"></div>

<div id="slots"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://ollmmbnptcpktgtltzzz.supabase.co",
  "sb_publishable_7E3Ai7_08sGkXhwhm85USw_Ikf5taX1"
);

/* FESTE FARBEN */
const COLORS = ["blue", "red", "green", "yellow", "purple"];

let myColor = localStorage.getItem("color") || null;

const colorContainer = document.getElementById("colors");
const slotContainer = document.getElementById("slots");

/* FARBEN ANZEIGEN */
function renderColors(usedColors) {
  colorContainer.innerHTML = "";

  COLORS.forEach(color => {
    const div = document.createElement("div");
    div.className = "colorBtn";
    div.style.background = color;

    if (color === myColor) {
      div.classList.add("active");
    }

    // Farbe blockieren wenn vergeben
    if (usedColors.includes(color) && color !== myColor) {
      div.style.opacity = "0.3";
      div.style.pointerEvents = "none";
    }

    div.onclick = () => {
      myColor = color;
      localStorage.setItem("color", color);
      load();
    };

    colorContainer.appendChild(div);
  });
}

/* SLOTS LADEN */
async function load() {
  const { data, error } = await supabase.from("slots").select("*");

  if (error) {
    console.error(error);
    alert("Fehler beim Laden!");
    return;
  }

  if (!data || data.length === 0) {
    console.warn("Keine Slots vorhanden!");
    return;
  }

  const usedColors = data.map(s => s.color).filter(c => c);

  renderColors(usedColors);

  slotContainer.innerHTML = "";

  data.forEach(slot => {
    const div = document.createElement("div");
    div.className = "slot";

    div.style.background = slot.color || "#ddd";

    div.onclick = () => clickSlot(slot, data);

    slotContainer.appendChild(div);
  });
}

/* KLICK LOGIK */
async function clickSlot(slot, allSlots) {
  if (!myColor) {
    alert("Bitte zuerst eine Farbe wählen!");
    return;
  }

  const myUsed = allSlots.find(s => s.color === myColor);

  // wenn ich schon einen anderen Slot habe → block
  if (myUsed && myUsed.id !== slot.id) {
    alert("Du hast bereits einen Punkt belegt!");
    return;
  }

  // frei → setzen
  if (!slot.color) {
    await supabase.from("slots")
      .update({ color: myColor })
      .eq("id", slot.id);
  }

  // eigener → freigeben
  else if (slot.color === myColor) {
    await supabase.from("slots")
      .update({ color: null })
      .eq("id", slot.id);
  }

  // fremd → nichts
}

/* LIVE UPDATES */
supabase.channel("slots-live")
.on(
  "postgres_changes",
  { event: "UPDATE", schema: "public", table: "slots" },
  () => load()
)
.subscribe();

/* START */
load();
</script>

</body>
</html>
